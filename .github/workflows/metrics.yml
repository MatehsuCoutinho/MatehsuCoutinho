name: GitHub Metrics

on:
  workflow_dispatch:
  schedule:
    - cron: "0 6 * * *"

jobs:
  metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: MatehsuCoutinho
          filename: assets/metrics.svg
          
          # Configuração para duas colunas
          base: header, activity
          repositories_affiliations: owner
          
          # Plugin de linguagens (equivalente ao top-langs)
          plugin_languages: yes
          plugin_languages_sections: most-used
          plugin_languages_details: percentage
          plugin_languages_limit: 8
          plugin_languages_colors: github
          plugin_languages_recent_calculation: true
          
          # Plugin de estatísticas (equivalente ao github stats)
          plugin_stats: yes
          plugin_stats_limit: 5
          plugin_stats_contributors: yes
          
          # Layout em duas colunas
          config_order: languages, stats, activity
          config_padding: 20
          config_output: svg
          
          # Estilo similar ao theme=radical
          config_style: "rounded, dark, background=linear-gradient(135deg, #141321 0%, #1F1B2E 100%)"
